name: Feature request
description: Suggest a new command, flag, or behavior
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that jira-cli doesn't support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the command, flag, or behavior you'd like. Include example invocations if possible.
      placeholder: |
        jira-cli worklog --key PROJ-1 --time 2h --comment "investigation"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
