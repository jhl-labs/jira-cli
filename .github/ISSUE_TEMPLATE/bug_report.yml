name: Bug report
description: Report a problem with jira-cli
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug. Please do not include tokens, passwords, or internal URLs.
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `jira-cli version`
      placeholder: v0.1.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS / arch
      options:
        - linux/amd64
        - linux/arm64
        - darwin/amd64
        - darwin/arm64
        - windows/amd64
        - other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you run, what did you expect, and what happened instead?
      placeholder: |
        Command: jira-cli get --key PROJ-1 --output text
        Expected: issue summary
        Actual: error ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Output / error
      description: Relevant output. Redact secrets and internal hostnames.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I have removed any tokens, passwords, and internal URLs from this report.
          required: true
